<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us - TravLEB</title>
  <link rel="stylesheet" href="./travLeb.css">
</head>
<body>

<!-- NAVBAR (NO SEARCH BAR) -->
<nav class="navbar">
  <h1>TravLEB</h1>
  <ul>
    <li><a href="./index.html">Home</a></li>
    <li><a href="./about_us.html">About Us</a></li>
    <li><a href="./travLeb_contact.html">Contact Us</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h2>Contact Us</h2>
    <p>We’d love to hear from you</p>
  </div>
</section>

<!-- CONTACT FORM -->
<section class="destinations">
  <h2>Get in Touch</h2>

  <div class="card" style="max-width: 500px; margin: auto;">
    <div class="card-content">

      <form id="contactForm">

        <div style="margin-bottom: 15px;">
          <label for="name">Name:</label><br>
          <input type="text" id="name" required style="width:100%; padding:10px; margin-top:5px;">
        </div>

        <div style="margin-bottom: 15px;">
          <label for="email">Email:</label><br>
          <input type="email" id="email" required style="width:100%; padding:10px; margin-top:5px;">
        </div>

        <div style="margin-bottom: 15px;">
          <label for="message">Message:</label><br>
          <textarea id="message" rows="5" required style="width:100%; padding:10px; margin-top:5px;"></textarea>
        </div>

        <button type="submit" style="width:100%; padding:12px; border:none; background:#4facfe; color:white; border-radius:25px; cursor:pointer;">
          Submit
        </button>

      </form>

    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 TravLEB - Explore Lebanon</p>
</footer>

</body>
</html>
